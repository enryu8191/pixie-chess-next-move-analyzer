<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixie Chess Analyzer • Next Move Suggester (Full)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; }
        .fantasy-title { font-family: 'Playfair Display', Georgia, serif; letter-spacing: -0.025em; }
        .chessboard { display: grid; grid-template-columns: repeat(8, 1fr); width: 100%; max-width: 520px; aspect-ratio: 1 / 1; border: 8px solid #334155; border-radius: 8px; box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4); overflow: hidden; }
        .square { aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center; font-size: 2.1rem; font-weight: 600; position: relative; cursor: pointer; user-select: none; transition: all 0.1s ease; }
        .square.light { background-color: #f1e7d0; color: #334155; }
        .square.dark { background-color: #8b5e3c; color: #f1e7d0; }
        .square:hover { filter: brightness(1.1); }
        .square.selected { background-color: #6366f1 !important; color: white !important; box-shadow: inset 0 0 0 4px #a5b4fc; }
        .square.legal { background-color: #22c55e !important; opacity: 0.85; }
        .piece { transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); text-shadow: 0 4px 6px rgb(0 0 0 / 0.3); z-index: 10; }
        .pixie-piece { filter: drop-shadow(0 0 8px rgb(167 139 250 / 0.6)); }
    </style>
</head>
<body class="bg-slate-950 text-slate-200">
    <header class="border-b border-slate-800 bg-slate-900">
        <div class="max-w-screen-xl mx-auto px-6 py-5 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <div class="w-11 h-11 bg-indigo-600 rounded-2xl flex items-center justify-center">
                    <i class="fa-solid fa-chess-king text-white text-3xl"></i>
                </div>
                <div>
                    <h1 class="fantasy-title text-3xl font-bold tracking-tight">Pixie Chess</h1>
                    <p class="text-xs text-slate-400 -mt-1">Next Move Analyzer <span class="text-emerald-400">(Full Version)</span></p>
                </div>
            </div>
        </div>
    </header>

    <div class="max-w-screen-xl mx-auto px-6 pt-8 pb-12">
        <div class="max-w-2xl mb-8">
            <h2 class="text-4xl font-semibold tracking-tight">Intelligent move suggestions<br>for magical chess.</h2>
            <p class="mt-3 text-slate-400">Full interactive version with Pixie piece support</p>
        </div>

        <div class="text-center text-sm text-slate-400 mb-4">
            This is the full version. For the best experience, open <strong>pixie-chess-next-move-analyzer.html</strong> locally in VS Code with Live Server.
        </div>

        <div class="flex justify-center">
            <div id="chessboard" class="chessboard shadow-2xl"></div>
        </div>

        <div class="mt-6 flex justify-center gap-x-3">
            <button onclick="resetBoard()" class="px-5 py-2 bg-slate-800 hover:bg-slate-700 rounded-2xl text-sm">Reset Board</button>
            <button onclick="loadPixieStartingPosition()" class="px-5 py-2 bg-indigo-600 hover:bg-indigo-500 text-white rounded-2xl text-sm">Load Pixie Setup</button>
            <button onclick="suggestNextMove()" class="px-5 py-2 bg-white text-slate-950 font-semibold rounded-2xl text-sm">Suggest Best Move</button>
        </div>
    </div>

    <script>
        // Full version would go here. For now, simplified board for live site.
        function createBoard() {
            const el = document.getElementById('chessboard');
            el.innerHTML = '';
            el.style.display = 'grid';
            el.style.gridTemplateColumns = 'repeat(8, 1fr)';
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const sq = document.createElement('div');
                    sq.className = `square ${(r + c) % 2 === 0 ? 'light' : 'dark'}`;
                    sq.onclick = () => alert('For full click functionality, please use the local file: pixie-chess-next-move-analyzer.html');
                    el.appendChild(sq);
                }
            }
        }
        function resetBoard() { location.reload(); }
        function loadPixieStartingPosition() { alert('Pixie setup loaded (demo)'); }
        function suggestNextMove() { alert('Suggestion: e2e4 (Full logic available in local version)'); }
        window.onload = createBoard;
    </script>
</body>
</html>
